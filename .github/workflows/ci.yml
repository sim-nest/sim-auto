# GitHub Actions CI for this repository.
name: ci
on:
  pull_request: {}
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git clone https://github.com/sim-nest/sim-tooling ../sim-tooling
          git -C ../sim-tooling checkout d1e9f3ea6861b3b2b1cfd142124c4556de1a0c74
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo run -p xtask -- check-file-sizes
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo run -p xtask -- simdoc --check
        env:
          SIMDOC_TOOLING_MANIFEST: ${{ github.workspace }}/../sim-tooling/Cargo.toml
